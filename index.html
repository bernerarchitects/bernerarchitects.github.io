<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Berner Architects | Digital Archive</title>
  <meta name="description"
    content="A digital archive of selected works from residential design firm Berner Architects in Marblehead, Massachusetts."> 
  <meta name="theme-color" content="#F4F1EA" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A1918" media="(prefers-color-scheme: dark)">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Berner Architects">
  <meta property="og:title" content="Berner Architects | Digital Archive">
  <meta property="og:description"
    content="A digital archive of selected works from residential design firm Berner Architects in Marblehead, Massachusetts.">

  <link rel="icon" href="/favicon.svg" type="image/svg+xml"> 
  <style>
    @font-face {
      font-family: "Jost";
      src: url("./fonts/jost-VF.woff2") format("woff2");
      font-weight: 400 500;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light dark;

      /* Color */
      --bg-color: #F4F1EA;
      --text-primary: #2A2925;
      --text-secondary: #6F6A61;
      --accent: #8E3A2B;
      --line-color: rgba(42, 41, 37, 0.18);
      --noise-opacity: 0.04;

      /* Geometry */
      --s-1: 8px;
      --s-2: 16px;
      --s-4: 32px;
      --s-8: 64px;
      --s-12: 96px;
      --s-16: 128px;
      --s-24: 192px;
      --s-32: 256px;

      /* Measures */
      --site-max: 1440px;
      --sidebar-width: 400px;
      --project-max: 576px;
      --thesis-max: 320px;

      /* Motion */
      --ease-reveal: cubic-bezier(0.25, 1, 0.5, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #1A1918;
        --text-primary: #EBE9E4;
        --text-secondary: #A09B91;
        --accent: #CE6B58;
        --line-color: rgba(235, 233, 228, 0.18);
        --noise-opacity: 0.02;
      }
    }

    /* Base */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    * {
      margin: 0;
      padding: 0;
    }

    ::selection {
      background-color: var(--accent);
      color: var(--bg-color);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: "Jost", "Avenir Next", "Futura", "Century Gothic", system-ui, sans-serif;
      line-height: 1.6;
    }

    img,
    svg {
      display: block;
    }

    img {
      max-width: 100%;
    }

    /* Surface */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: var(--noise-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Layout */
    .site-wrapper {
      display: grid;
      min-height: 100vh;
      max-width: var(--site-max);
      margin-inline: auto;
    }

    .hearth,
    .gallery {
      display: flex;
      flex-direction: column;
      padding: var(--s-12) var(--s-4);
    }

    .hearth {
      gap: var(--s-8);
      border-bottom: 1px solid var(--line-color);
    }

    .brand-lockup {
      display: grid;
      gap: var(--s-4);
    }

    .hearth::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: auto;
      background:
        linear-gradient(90deg,
          var(--accent) 0 21%,
          transparent 21% 34%,
          var(--line-color) 34% 100%);
    }

    .gallery {
      gap: var(--s-24);
      padding-bottom: var(--s-32);
    }

    /* Identity */
    .brand-logo {
      width: clamp(112px, 10vw, 152px);
      height: auto;
      color: var(--accent);
    }

    .brand-name {
      color: var(--text-primary);
      font-size: clamp(1.125rem, 1vw + 1rem, 1.375rem);
      font-weight: 500;
      line-height: 1.25;
      text-transform: uppercase;
      letter-spacing: clamp(0.18em, 1.2vw, 0.28em);
    }

    .brand-name span {
      display: block;
    }

    /* Thesis */
    .thesis {
      display: grid;
      gap: var(--s-4);
      max-width: var(--thesis-max);
    }

    .thesis-meta,
    .thesis-volume {
      font-size: 0.75rem;
      text-transform: uppercase;
    }

    .thesis-meta {
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.15em;
    }

    .thesis-copy {
      font-size: clamp(1.0625rem, 0.5vw + 1rem, 1.1875rem);
      font-weight: 400;
      line-height: 1.65;
    }

    .thesis-volume {
      color: var(--text-secondary);
      letter-spacing: 0.1em;
    }

    /* Projects */
    .project {
      width: 100%;
      max-width: var(--project-max);
    }

    .project,
    .project-figure {
      display: flex;
      flex-direction: column;
      gap: var(--s-4);
    }

    .project img {
      width: 100%;
      height: auto;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      box-shadow: 0 0 0 1px var(--line-color);
      filter: grayscale(0%) contrast(1.04);
      transition: filter 0.8s var(--ease-reveal);
    }

    .project-details {
      display: grid;
      gap: var(--s-1);
    }

    .project-title {
      display: flex;
      align-items: center;
      gap: var(--s-2);
      color: var(--text-primary);
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .project-title::before {
      content: "";
      flex: 0 0 auto;
      width: var(--s-4);
      height: 1px;
      background-color: var(--accent);
      transition: width 0.6s ease;
    }

    .project-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 0 var(--s-1);
      padding-left: calc(var(--s-4) + var(--s-2));
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.6s ease;
    }

    /* Interaction */
    @media (hover: hover) and (pointer: fine) {
      .project img {
        filter: grayscale(45%) contrast(1.04);
      }

      .project:hover img {
        filter: grayscale(0%) contrast(1.04);
      }

      .project:hover .project-title::before {
        width: var(--s-8);
      }

      .project:hover .project-specs {
        color: var(--text-primary);
      }
    }

    /* Desktop */
    @media (min-width: 1080px) {
      .site-wrapper {
        grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      }

      .hearth {
        position: sticky;
        top: 0;
        align-self: start;
        min-height: 100vh;
        border-bottom: 0;
        border-right: 1px solid var(--line-color);
        padding: var(--s-16) var(--s-8);
      }

      .gallery {
        padding: var(--s-16) var(--s-12) var(--s-32);
      }

      .project:nth-child(even) {
        align-self: flex-end;
      }
    }

    /* Preferences */
    @media (prefers-reduced-motion: reduce) {

      .project img,
      .project-title::before,
      .project-specs {
        transition: none;
      }
    }

    @media (forced-colors: active) {
      body::before {
        display: none;
      }

      .brand-logo {
        color: CanvasText;
      }

      .project-title::before {
        background-color: CanvasText;
      }
    }
  </style>
</head>

<body>
  <div class="site-wrapper">
    <header class="hearth">
        <div class="brand-lockup">

      <svg class="brand-logo" aria-hidden="true" focusable="false" viewBox="-3 -3 766 556" fill="none"
        xmlns="http://www.w3.org/2000/svg">
        <g stroke="currentColor" stroke-width="5" stroke-linecap="round">
          <line x1="210" y1="0" x2="210" y2="550" />
          <line x1="550" y1="0" x2="550" y2="550" />
          <line x1="0" y1="210" x2="760" y2="210" />
          <line x1="0" y1="275" x2="760" y2="275" />
          <line x1="0" y1="340" x2="210" y2="340" />
          <line x1="550" y1="340" x2="760" y2="340" />
          <line x1="0" y1="0" x2="550" y2="550" />
          <line x1="210" y1="0" x2="760" y2="550" />
          <line x1="760" y1="0" x2="210" y2="550" />
          <line x1="550" y1="0" x2="0" y2="550" />
          <line x1="210" y1="0" x2="0" y2="210" />
          <line x1="550" y1="0" x2="760" y2="210" />
          <line x1="0" y1="340" x2="210" y2="550" />
          <line x1="760" y1="340" x2="550" y2="550" />
        </g>
        <g stroke="currentColor" stroke-width="5">
          <polyline points="210,550 0,550 0,0 760,0 760,550 550,550" />
          <circle cx="380" cy="170" r="40" />
          <circle cx="380" cy="380" r="170" />
        </g>
      </svg>

      <h1 class="brand-name">
        <span>Berner</span>
        <span>Architects</span>
      </h1>
</div>
      <div class="thesis">
        <p class="thesis-meta">
          Est. <time datetime="1985">1985</time> — Marblehead, MA
        </p>

        <p class="thesis-copy">
          Designing structures of consequence with architecture rooted in material honesty and historic continuity.
        </p>

        <p class="thesis-copy">
          Every structure we design is a quiet rebellion against the ordinary.
        </p>

        <p class="thesis-volume">Digital Archive / Vol. I</p>
      </div>
    </header>

    <main class="gallery">
      <article class="project" aria-labelledby="project-whittier-title">
        <figure class="project-figure">
          <img src="/images/whittier.webp" width="1200" height="900"
            alt="Exterior view of a modern residential home with fiber cement paneling and natural stone pavers"
            decoding="async" fetchpriority="high">

          <figcaption class="project-details">
            <h2 class="project-title" id="project-whittier-title">01 — Whittier Road</h2>
            <p class="project-specs">
              <time datetime="2024">2024</time>
              <span class="project-separator" aria-hidden="true">//</span>
              <span>Fiber Cement Panels · Natural Stone Pavers</span>
            </p>
          </figcaption>
        </figure>
      </article>

      <article class="project" aria-labelledby="project-magnolia-title">
        <figure class="project-figure">
          <img src="/images/magnolia.jpg" width="1200" height="900" alt="Renovated vestibule and standing seam metal roofing"
            loading="lazy" decoding="async">

          <figcaption class="project-details">
            <h2 class="project-title" id="project-magnolia-title">02 — Magnolia Renovation</h2>
            <p class="project-specs">
              <time datetime="1997">1997</time>
              <span class="project-separator" aria-hidden="true">//</span>
              <span>Standing Seam Metal Roofing · Wood Lattice</span>
            </p>
          </figcaption>
        </figure>
      </article>

      <article class="project" aria-labelledby="project-taliesin-title">
        <figure class="project-figure">
          <img src="/images/taliesin.jpg" width="1200" height="900" alt="Study of Frank Lloyd Wright's Taliesin West"
            loading="lazy" decoding="async">

          <figcaption class="project-details">
            <h2 class="project-title" id="project-taliesin-title">03 — Taliesin West Study</h2>
            <p class="project-specs">
              <span>Desert Masonry · Redwood Scantlings</span>
            </p>
          </figcaption>
        </figure>
      </article>
    </main>
  </div>

</body>

</html>
